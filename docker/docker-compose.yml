services:
  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  db:
    image: postgres:16
    container_name: qjob-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-qjob}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      POSTGRES_DB: ${POSTGRES_DB:-qjob}
    volumes:
      - qjob-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-qjob} -d ${POSTGRES_DB:-qjob}
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── API server ───────────────────────────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: qjob:latest
    container_name: qjob-api
    restart: unless-stopped
    command:
      - serve
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
    environment:
      QJOB_DB_URL: postgresql+psycopg://${POSTGRES_USER:-qjob}:${POSTGRES_PASSWORD:-change_me}@db:5432/${POSTGRES_DB:-qjob}
    ports:
      - "${API_HOST_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy

  # ── Scheduler ────────────────────────────────────────────────────────────────
  scheduler:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: qjob:latest
    container_name: qjob-scheduler
    restart: unless-stopped
    command:
      - scheduler
      - --poll-interval
      - "${SCHEDULER_POLL_INTERVAL:-2.0}"
      - --max-workers
      - "${SCHEDULER_MAX_WORKERS:-64}"
    environment:
      QJOB_DB_URL: postgresql+psycopg://${POSTGRES_USER:-qjob}:${POSTGRES_PASSWORD:-change_me}@db:5432/${POSTGRES_DB:-qjob}
    depends_on:
      db:
        condition: service_healthy

volumes:
  qjob-postgres-data:
